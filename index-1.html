<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Matrix Dojo VR</title>
<style>
  :root{
    --green:#00ff41;
    --dgreen:#0a3d1f;
    --black:#020803;
    --red:#ff3b3b;
    --foam:#d8ffe4;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 20%, #041a0a 0%, #000200 75%);
    font-family:'Courier New', monospace;
    color:var(--foam);
  }
  canvas{ display:block; }

  #ui{
    position:fixed; inset:0; pointer-events:none;
    display:flex; flex-direction:column; align-items:center;
    padding:30px 16px; z-index:5;
  }
  #ui.hidden{ display:none; }
  #titleCard{ text-align:center; text-shadow:0 0 18px rgba(0,255,65,0.6); }
  #titleCard h1{
    margin:0; font-size:clamp(1.8rem,6vw,2.8rem); letter-spacing:4px;
    color:var(--green); font-weight:700;
  }
  #titleCard p{ margin:10px 0 0; font-size:0.85rem; opacity:0.85; max-width:460px; line-height:1.6; }
  .controls-grid{
    margin-top:18px; display:grid; grid-template-columns:1fr 1fr; gap:8px 22px;
    font-size:0.78rem; text-align:left; pointer-events:none;
    background:rgba(0,20,8,0.55); border:1px solid rgba(0,255,65,0.35);
    padding:14px 20px; border-radius:6px;
  }
  .controls-grid b{ color:var(--green); }
  #bottomBar{ margin-top:auto; pointer-events:auto; }
  #VRButton{
    position:fixed !important; bottom:26px !important; left:50% !important;
    transform:translateX(-50%);
    background:rgba(0,20,8,0.7) !important;
    border:1px solid var(--green) !important;
    color:var(--green) !important;
    border-radius:6px !important;
    font-family:'Courier New', monospace !important;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="titleCard">
    <h1>MATRIX // DOJO</h1>
    <p>Difenditi dagli Agenti nella pioggia di codice. Indossa il visore e premi "Entra in VR".</p>
    <div class="controls-grid">
      <div><b>Stick sinistro</b> — cammina</div>
      <div><b>Stick destro</b> — gira a scatti</div>
      <div><b>Grilletto</b> — pugno</div>
      <div><b>Presa (grip)</b> — bullet-time</div>
      <div><b>Pulsante A/X</b> — scatto (dash)</div>
      <div><b>Pulsante B/Y</b> — onda d'urto</div>
    </div>
  </div>
  <div id="bottomBar"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';

/* ============================================================
   MATRIX // DOJO — combattimento VR con pioggia di codice
   Movimento con lo stick, abilità sui pulsanti dei controller.
   ============================================================ */

// ---------- Renderer / Scene / Camera / Rig ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020a04);
scene.fog = new THREE.FogExp2(0x021b0a, 0.035);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.05, 60);
camera.position.set(0, 1.6, 5);

const cameraRig = new THREE.Group();
cameraRig.add(camera);
scene.add(cameraRig);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// Anteprima desktop (mouse)
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.6, 4);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.enableZoom = false;
controls.minDistance = 1;
controls.maxDistance = 1;
controls.update();

// ---------- Luci ----------
const hemi = new THREE.HemisphereLight(0x2bff7a, 0x020a04, 0.7);
scene.add(hemi);
const key = new THREE.PointLight(0x00ff41, 1.1, 14);
key.position.set(0, 3.2, 0);
scene.add(key);
const rim = new THREE.DirectionalLight(0x0aff5a, 0.35);
rim.position.set(-4, 6, -3);
scene.add(rim);

// ---------- Pavimento del dojo ----------
function makeFloorTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#03110a';
  ctx.fillRect(0, 0, 512, 512);
  ctx.strokeStyle = 'rgba(0,255,65,0.55)';
  ctx.lineWidth = 2;
  const step = 64;
  for (let i = 0; i <= 512; i += step) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(512, i); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(5, 5);
  return tex;
}
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(10, 48),
  new THREE.MeshStandardMaterial({ map: makeFloorTexture(), roughness: 0.85, emissive: 0x001a08, emissiveIntensity: 0.4 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// Pilastri decorativi ai 4 punti cardinali
const pillarMat = new THREE.MeshStandardMaterial({ color: 0x061b0d, roughness: 0.6, emissive: 0x00ff41, emissiveIntensity: 0.25 });
for (let i = 0; i < 4; i++) {
  const ang = (i / 4) * Math.PI * 2;
  const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 3.4, 10), pillarMat);
  pillar.position.set(Math.cos(ang) * 9.4, 1.7, Math.sin(ang) * 9.4);
  scene.add(pillar);
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.03, 8, 16), new THREE.MeshStandardMaterial({ color: 0x00ff41, emissive: 0x00ff41, emissiveIntensity: 1 }));
  ring.position.set(pillar.position.x, 3.1, pillar.position.z);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);
}

// ---------- Pioggia di codice (cilindro avvolgente) ----------
function makeCodeTexture() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 256, 512);
  ctx.font = '18px monospace';
  const glyphs = '01アイウエオカキクケコサシスセソ';
  for (let col = 0; col < 12; col++) {
    const x = col * 22;
    const brightCount = 3 + Math.floor(Math.random() * 4);
    for (let row = 0; row < 26; row++) {
      const y = row * 20;
      const isBright = row < brightCount;
      ctx.fillStyle = isBright ? 'rgba(180,255,200,0.95)' : `rgba(0,255,65,${0.15 + Math.random()*0.35})`;
      ctx.fillText(glyphs[Math.floor(Math.random()*glyphs.length)], x, y);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(6, 3);
  return tex;
}
const codeTex = makeCodeTexture();
const codeCylinder = new THREE.Mesh(
  new THREE.CylinderGeometry(13, 13, 9, 32, 1, true),
  new THREE.MeshBasicMaterial({ map: codeTex, transparent: true, opacity: 0.55, side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false })
);
codeCylinder.position.y = 4;
scene.add(codeCylinder);

// ---------- Stato di gioco ----------
const player = { health: 100, maxHealth: 100, score: 0, combo: 0, invulnerableUntil: 0 };
let dashCooldownUntil = 0;
let shockwaveCooldownUntil = 0;
let gameState = 'playing';
const clock = new THREE.Clock();
let elapsed = 0;

const DASH_DIST = 2.4;
const DASH_COOLDOWN = 1.5;
const DASH_IFRAME = 0.4;
const SHOCKWAVE_RADIUS = 3.4;
const SHOCKWAVE_COOLDOWN = 4;
const PUNCH_RANGE = 1.15;
const ATTACK_RANGE = 1.05;
const MOVE_SPEED = 2.3;

// ---------- HUD in-headset (canvas attaccato alla camera) ----------
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 512; hudCanvas.height = 200;
const hudCtx = hudCanvas.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCanvas);
const hudMat = new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, depthTest: false });
const hudPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.195), hudMat);
hudPlane.position.set(0, -0.28, -0.65);
hudPlane.renderOrder = 999;
camera.add(hudPlane);

let lastHudDraw = 0;
function drawHUD(force) {
  if (!force && elapsed - lastHudDraw < 0.12) return;
  lastHudDraw = elapsed;
  const ctx = hudCtx;
  ctx.clearRect(0, 0, 512, 200);
  ctx.fillStyle = 'rgba(0,15,6,0.55)';
  ctx.fillRect(0, 0, 512, 200);
  ctx.strokeStyle = 'rgba(0,255,65,0.7)';
  ctx.strokeRect(2, 2, 508, 196);

  // barra vita
  ctx.fillStyle = '#062a12';
  ctx.fillRect(24, 24, 300, 26);
  const hpRatio = Math.max(0, player.health / player.maxHealth);
  ctx.fillStyle = hpRatio > 0.3 ? '#00ff41' : '#ff3b3b';
  ctx.fillRect(24, 24, 300 * hpRatio, 26);
  ctx.strokeStyle = '#00ff41';
  ctx.strokeRect(24, 24, 300, 26);
  ctx.fillStyle = '#d8ffe4';
  ctx.font = '16px monospace';
  ctx.fillText('VITA', 24, 66);

  // punteggio / combo
  ctx.font = '22px monospace';
  ctx.fillStyle = '#00ff41';
  ctx.fillText('PUNTI ' + player.score, 340, 40);
  ctx.font = '14px monospace';
  ctx.fillStyle = '#d8ffe4';
  ctx.fillText('combo x' + player.combo, 340, 62);

  // cooldown abilità
  const now = elapsed;
  ctx.font = '13px monospace';
  ctx.fillStyle = now >= dashCooldownUntil ? '#00ff41' : '#3a5f45';
  ctx.fillText('SCATTO ' + (now >= dashCooldownUntil ? 'pronto' : Math.ceil(dashCooldownUntil-now)+'s'), 24, 110);
  ctx.fillStyle = now >= shockwaveCooldownUntil ? '#00ff41' : '#3a5f45';
  ctx.fillText('ONDA D\'URTO ' + (now >= shockwaveCooldownUntil ? 'pronta' : Math.ceil(shockwaveCooldownUntil-now)+'s'), 24, 130);

  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, 512, 200);
    ctx.fillStyle = '#ff3b3b';
    ctx.font = 'bold 26px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DISCONNESSO', 256, 90);
    ctx.font = '15px monospace';
    ctx.fillStyle = '#d8ffe4';
    ctx.fillText('punti: ' + player.score + ' — grilletto per riprovare', 256, 118);
    ctx.textAlign = 'left';
  }

  hudTex.needsUpdate = true;
}
drawHUD(true);

// ---------- Nemici (Agenti) ----------
const enemies = [];
const particles = [];

function makeAgent() {
  const g = new THREE.Group();
  const suit = new THREE.MeshStandardMaterial({ color: 0x0a0f0c, roughness: 0.6 });
  const tieMat = new THREE.MeshStandardMaterial({ color: 0xff3b3b, emissive: 0x550000, emissiveIntensity: 0.4 });
  const skinMat = new THREE.MeshStandardMaterial({ color: 0x1a1f1c, roughness: 0.8 });

  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.22), suit);
  torso.position.y = 1.0;
  g.add(torso);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), skinMat);
  head.position.y = 1.42;
  g.add(head);

  const tie = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.35, 0.02), tieMat);
  tie.position.set(0, 1.05, 0.12);
  g.add(tie);

  const armGeo = new THREE.BoxGeometry(0.11, 0.5, 0.11);
  const armL = new THREE.Mesh(armGeo, suit); armL.position.set(0.27, 1.02, 0); g.add(armL);
  const armR = new THREE.Mesh(armGeo, suit); armR.position.set(-0.27, 1.02, 0); g.add(armR);

  const legGeo = new THREE.BoxGeometry(0.14, 0.62, 0.14);
  const legL = new THREE.Mesh(legGeo, suit); legL.position.set(0.11, 0.4, 0); g.add(legL);
  const legR = new THREE.Mesh(legGeo, suit); legR.position.set(-0.11, 0.4, 0); g.add(legR);

  return g;
}

function spawnEnemy() {
  if (enemies.filter(e => e.state === 'walk').length >= 6) return;
  const ang = Math.random() * Math.PI * 2;
  const rad = 8.5;
  const g = makeAgent();
  const rigPos = cameraRig.position;
  g.position.set(rigPos.x + Math.cos(ang) * rad, 0, rigPos.z + Math.sin(ang) * rad);
  scene.add(g);
  enemies.push({ group: g, state: 'walk', speed: 0.75 + Math.random() * 0.35, nextAttackReady: 0, dissolveT: 0 });
}

function spawnBurst(position) {
  for (let i = 0; i < 8; i++) {
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.05, 0.05, 0.05),
      new THREE.MeshBasicMaterial({ color: 0x00ff41, transparent: true, opacity: 1 })
    );
    mesh.position.copy(position);
    mesh.position.y += 0.9;
    const vel = new THREE.Vector3((Math.random()-0.5)*2.2, Math.random()*2.5, (Math.random()-0.5)*2.2);
    scene.add(mesh);
    particles.push({ mesh, vel, life: 0.6 });
  }
}

function killEnemy(e) {
  if (e.state !== 'walk') return;
  e.state = 'dissolving';
  e.dissolveT = 0;
  spawnBurst(e.group.position);
  player.score += 10 * (1 + player.combo * 0.1) | 0;
  player.combo += 1;
  drawHUD(true);
}

let spawnTimer = 0;
let spawnInterval = 3.2;

function updateEnemies(dt) {
  spawnTimer += dt;
  if (spawnTimer > spawnInterval) {
    spawnTimer = 0;
    spawnInterval = Math.max(1.4, spawnInterval - 0.05);
    spawnEnemy();
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.state === 'walk') {
      const dir = new THREE.Vector3().subVectors(cameraRig.position, e.group.position);
      dir.y = 0;
      const dist = dir.length();
      if (dist > ATTACK_RANGE) {
        dir.normalize();
        e.group.position.addScaledVector(dir, e.speed * dt);
        const targetAngle = Math.atan2(dir.x, dir.z);
        let da = targetAngle - e.group.rotation.y;
        da = Math.atan2(Math.sin(da), Math.cos(da));
        e.group.rotation.y += da * Math.min(1, dt * 4);
      } else if (elapsed >= e.nextAttackReady) {
        if (elapsed < player.invulnerableUntil) {
          e.nextAttackReady = elapsed + 0.8;
        } else {
          player.health -= 12;
          player.combo = 0;
          e.nextAttackReady = elapsed + 1.3;
          drawHUD(true);
          if (player.health <= 0) triggerGameOver();
        }
      }
    } else if (e.state === 'dissolving') {
      e.dissolveT += dt;
      const k = Math.min(1, e.dissolveT / 0.5);
      e.group.scale.setScalar(Math.max(1 - k, 0.001));
      e.group.position.y = k * 0.4;
      if (e.dissolveT >= 0.5) {
        scene.remove(e.group);
        enemies.splice(i, 1);
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.vel.y -= 3 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = Math.max(0, p.life / 0.6);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }
}

function resetGame() {
  enemies.forEach(e => scene.remove(e.group));
  enemies.length = 0;
  particles.forEach(p => scene.remove(p.mesh));
  particles.length = 0;
  player.health = player.maxHealth;
  player.score = 0;
  player.combo = 0;
  player.invulnerableUntil = 0;
  dashCooldownUntil = 0;
  shockwaveCooldownUntil = 0;
  spawnTimer = 0;
  spawnInterval = 3.2;
  gameState = 'playing';
  drawHUD(true);
}

function triggerGameOver() {
  gameState = 'gameover';
  drawHUD(true);
}

// ---------- Abilità ----------
function doPunch(controller) {
  if (gameState !== 'playing') return;
  const pos = new THREE.Vector3();
  controller.getWorldPosition(pos);
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(controller.getWorldQuaternion(new THREE.Quaternion()));
  enemies.forEach(e => {
    if (e.state !== 'walk') return;
    const toEnemy = new THREE.Vector3().subVectors(e.group.position, pos);
    toEnemy.y += 1.0;
    const dist = toEnemy.length();
    if (dist < PUNCH_RANGE) {
      const dot = forward.dot(toEnemy.clone().normalize());
      if (dot > 0.45) killEnemy(e);
    }
  });
}

function doDash() {
  if (gameState !== 'playing' || elapsed < dashCooldownUntil) return;
  const quat = camera.getWorldQuaternion(new THREE.Quaternion());
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(quat);
  forward.y = 0; forward.normalize();
  cameraRig.position.addScaledVector(forward, DASH_DIST);
  player.invulnerableUntil = elapsed + DASH_IFRAME;
  dashCooldownUntil = elapsed + DASH_COOLDOWN;
  drawHUD(true);
}

function doShockwave() {
  if (gameState !== 'playing' || elapsed < shockwaveCooldownUntil) return;
  shockwaveCooldownUntil = elapsed + SHOCKWAVE_COOLDOWN;
  enemies.forEach(e => {
    if (e.state !== 'walk') return;
    const dist = e.group.position.distanceTo(cameraRig.position);
    if (dist < SHOCKWAVE_RADIUS) killEnemy(e);
  });
  drawHUD(true);
}

// ---------- Input controller VR ----------
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
[controller0, controller1].forEach(controller => {
  controller.addEventListener('connected', (e) => {
    controller.userData.handedness = e.data.handedness;
    controller.userData.gamepad = e.data.gamepad;
    controller.userData.prevButtons = [];
  });
  controller.addEventListener('disconnected', () => {
    controller.userData.handedness = null;
    controller.userData.gamepad = null;
  });
  scene.add(controller);
});

let lastSnapTime = 0;
let bulletTimeActive = false;

function updateInput(dt) {
  bulletTimeActive = false;
  [controller0, controller1].forEach(controller => {
    const gp = controller.userData.gamepad;
    if (!gp) return;
    const hand = controller.userData.handedness;
    const axes = gp.axes || [];
    const buttons = gp.buttons || [];
    const prev = controller.userData.prevButtons || [];

    if (hand === 'left') {
      const x = axes[2] || 0, y = axes[3] || 0;
      if (Math.hypot(x, y) > 0.15) {
        const quat = camera.getWorldQuaternion(new THREE.Quaternion());
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(quat); forward.y = 0; forward.normalize();
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(quat); right.y = 0; right.normalize();
        const move = new THREE.Vector3();
        move.addScaledVector(forward, -y);
        move.addScaledVector(right, x);
        if (move.lengthSq() > 0) {
          move.normalize().multiplyScalar(MOVE_SPEED * dt);
          cameraRig.position.add(move);
        }
      }
    } else if (hand === 'right') {
      const x = axes[2] || 0;
      if (Math.abs(x) > 0.6 && elapsed - lastSnapTime > 0.35) {
        cameraRig.rotation.y -= Math.sign(x) * (Math.PI / 6);
        lastSnapTime = elapsed;
      }
    }

    if (buttons[1] && buttons[1].pressed) bulletTimeActive = true;

    if (buttons[0] && buttons[0].pressed && !prev[0]) {
      if (gameState === 'gameover') resetGame(); else doPunch(controller);
    }
    if (buttons[4] && buttons[4].pressed && !prev[4]) doDash();
    if (buttons[5] && buttons[5].pressed && !prev[5]) doShockwave();

    controller.userData.prevButtons = buttons.map(b => !!b.pressed);
  });
}

renderer.xr.addEventListener('sessionstart', () => {
  document.getElementById('ui').classList.add('hidden');
  resetGame();
});
renderer.xr.addEventListener('sessionend', () => {
  document.getElementById('ui').classList.remove('hidden');
});

// ---------- Loop ----------
function animate() {
  const rawDt = Math.min(clock.getDelta(), 0.05);
  updateInput(rawDt);
  const dt = rawDt * (bulletTimeActive ? 0.35 : 1);
  elapsed += dt;

  if (gameState === 'playing') {
    updateEnemies(dt);
  }
  updateParticles(dt);

  codeCylinder.material.map.offset.y += rawDt * 0.12;
  key.intensity = 1.0 + Math.sin(elapsed * 1.4) * 0.15;

  drawHUD(false);

  if (!renderer.xr.isPresenting) controls.update();
  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);
</script>
</body>
</html>
