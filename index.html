<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Acquario VR — Deep Blue</title>
<style>
  :root{
    --deep:#031f2e;
    --teal:#0a5f6e;
    --aqua:#4fd6c9;
    --coral:#ff8a5b;
    --gold:#ffd166;
    --foam:#eafffb;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 20%, #0d3b4d 0%, #031f2e 70%);
    font-family:'Segoe UI', system-ui, sans-serif;
    color:var(--foam);
  }
  canvas{ display:block; }

  #ui{
    position:fixed; inset:0; pointer-events:none;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px; z-index:5;
  }
  #ui.hidden{ display:none; }
  #titleCard{
    text-align:center; pointer-events:none;
    text-shadow:0 2px 16px rgba(0,0,0,0.6);
  }
  #titleCard h1{
    margin:0; font-size:clamp(1.6rem,5vw,2.4rem);
    letter-spacing:1px; font-weight:300;
    color:var(--foam);
  }
  #titleCard h1 b{ color:var(--aqua); font-weight:600; }
  #titleCard p{
    margin:8px 0 0; font-size:0.9rem; opacity:0.8; max-width:420px;
  }
  #bottomBar{
    margin-top:auto; display:flex; gap:12px; align-items:center;
    flex-wrap:wrap; justify-content:center; pointer-events:auto;
  }
  button.pillbtn{
    font-family:inherit; font-size:0.95rem; font-weight:600;
    color:var(--deep); background:linear-gradient(90deg,var(--aqua),#7fe9de);
    border:none; border-radius:999px; padding:12px 26px; cursor:pointer;
    box-shadow:0 6px 20px rgba(79,214,201,0.35);
    transition:transform 0.15s ease;
  }
  button.pillbtn:hover{ transform:translateY(-2px); }
  button.pillbtn:active{ transform:translateY(0); }
  #vrHint{
    font-size:0.8rem; opacity:0.7; text-align:center; max-width:320px; pointer-events:none;
  }
  /* Il pulsante VRButton di three.js viene iniettato dal JS: lo restiliamo qui */
  #VRButton{
    position:fixed !important; bottom:28px !important; left:50% !important;
    transform:translateX(-50%);
    background:rgba(10,40,50,0.6) !important;
    border:1px solid var(--aqua) !important;
    color:var(--foam) !important;
    border-radius:999px !important;
    font-family:inherit !important;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="titleCard">
    <h1>Acquario <b>VR</b></h1>
    <p>Indossa il visore Quest e premi "Entra in VR" qui sotto. Senza visore puoi comunque guardarti intorno trascinando con il mouse.</p>
  </div>
  <div id="bottomBar">
    <button class="pillbtn" id="btnAddFish">🐠 Aggiungi pesce</button>
  </div>
  <p id="vrHint">Nel visore: premi il grilletto del controller per far comparire un pesce.</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';

/* ============================================================
   ACQUARIO VR — Deep Blue
   Esperienza WebXR per Meta Quest, ospitabile su GitHub Pages.
   ============================================================ */

// ---------- Renderer / Scene / Camera ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x083244);
scene.fog = new THREE.FogExp2(0x0a4a5e, 0.045);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.05, 60);
camera.position.set(0, 1.6, 4);
const lookTarget = new THREE.Vector3(0, 1.6, 3); // 1 unità davanti alla camera

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// Controlli mouse per l'anteprima desktop (disattivi durante la sessione XR)
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(lookTarget);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.enableZoom = false;
controls.minDistance = 1;
controls.maxDistance = 1; // l'utente ruota sul posto, come indosserebbe il visore
controls.update();

// ---------- Luci ----------
const hemi = new THREE.HemisphereLight(0x8fdfea, 0x03202b, 0.9);
scene.add(hemi);

const causticLight = new THREE.DirectionalLight(0xbdf5ff, 0.6);
causticLight.position.set(2, 6, 1);
scene.add(causticLight);

const fillLight = new THREE.PointLight(0x2ec4b6, 0.4, 12);
fillLight.position.set(-3, 1, -2);
scene.add(fillLight);

// ---------- Fondale sabbioso ----------
const floorY = -1.6;
function makeSandTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#cdb27e';
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 900; i++) {
    ctx.fillStyle = `rgba(${150 + Math.random()*60},${120+Math.random()*50},${70+Math.random()*40},0.35)`;
    const x = Math.random()*256, y = Math.random()*256, r = Math.random()*1.6;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(6,6);
  return tex;
}
const floorGeo = new THREE.CircleGeometry(14, 48);
const floorMat = new THREE.MeshStandardMaterial({ map: makeSandTexture(), roughness: 1 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = floorY;
scene.add(floor);

// Rocce sparse
const rockGeo = new THREE.IcosahedronGeometry(1, 0);
const rockMat = new THREE.MeshStandardMaterial({ color: 0x3c4a4a, roughness: 0.95, flatShading: true });
for (let i = 0; i < 10; i++) {
  const rock = new THREE.Mesh(rockGeo, rockMat);
  const ang = Math.random() * Math.PI * 2;
  const rad = 3 + Math.random() * 9;
  rock.position.set(Math.cos(ang)*rad, floorY + 0.15, Math.sin(ang)*rad);
  const s = 0.25 + Math.random()*0.6;
  rock.scale.set(s, s*0.7, s);
  rock.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
  scene.add(rock);
}

// ---------- Alghe ----------
const weedMat = new THREE.MeshStandardMaterial({ color: 0x1f8a5f, roughness: 0.7, side: THREE.DoubleSide });
const weeds = [];
function makeWeedCluster(x, z) {
  const group = new THREE.Group();
  const bladeCount = 4 + Math.floor(Math.random()*3);
  for (let b = 0; b < bladeCount; b++) {
    const segs = 5;
    const segH = 0.28;
    let parent = group;
    const bladeAngle = Math.random()*Math.PI*2;
    for (let s = 0; s < segs; s++) {
      const geo = new THREE.BoxGeometry(0.05, segH, 0.02);
      geo.translate(0, segH/2, 0);
      const mesh = new THREE.Mesh(geo, weedMat);
      mesh.position.y = s === 0 ? 0 : segH;
      mesh.rotation.y = bladeAngle;
      parent.add(mesh);
      parent = mesh;
    }
    group.userData.blades = group.userData.blades || [];
  }
  group.position.set(x, floorY, z);
  group.userData.phase = Math.random()*Math.PI*2;
  scene.add(group);
  weeds.push(group);
}
for (let i = 0; i < 9; i++) {
  const ang = Math.random()*Math.PI*2;
  const rad = 2.5 + Math.random()*9.5;
  makeWeedCluster(Math.cos(ang)*rad, Math.sin(ang)*rad);
}

// ---------- Raggi di luce subacquei ----------
function makeRayTexture() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,256);
  grad.addColorStop(0, 'rgba(255,255,255,0.55)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,64,256);
  return new THREE.CanvasTexture(c);
}
const rayTex = makeRayTexture();
const rayMat = new THREE.MeshBasicMaterial({
  map: rayTex, transparent: true, blending: THREE.AdditiveBlending,
  depthWrite: false, side: THREE.DoubleSide, opacity: 0.35
});
const rays = [];
for (let i = 0; i < 5; i++) {
  const geo = new THREE.PlaneGeometry(1.4, 9);
  const ray = new THREE.Mesh(geo, rayMat);
  const ang = Math.random()*Math.PI*2;
  const rad = 2 + Math.random()*6;
  ray.position.set(Math.cos(ang)*rad, 3, Math.sin(ang)*rad);
  ray.rotation.x = -0.15;
  ray.rotation.y = Math.random()*Math.PI;
  ray.rotation.z = (Math.random()-0.5)*0.3;
  ray.userData.driftSpeed = 0.05 + Math.random()*0.05;
  ray.userData.baseY = ray.position.y;
  scene.add(ray);
  rays.push(ray);
}

// ---------- Bolle ----------
const BUBBLE_COUNT = 50;
const bubbleGeo = new THREE.SphereGeometry(1, 8, 6);
const bubbleMat = new THREE.MeshPhysicalMaterial({
  color: 0xdfffff, transparent: true, opacity: 0.35, roughness: 0.1,
  metalness: 0, transmission: 0.6, thickness: 0.2
});
const bubbleMesh = new THREE.InstancedMesh(bubbleGeo, bubbleMat, BUBBLE_COUNT);
scene.add(bubbleMesh);
const bubbleData = [];
const dummy = new THREE.Object3D();
for (let i = 0; i < BUBBLE_COUNT; i++) {
  const scale = 0.02 + Math.random()*0.05;
  bubbleData.push({
    x: (Math.random()-0.5)*16,
    z: (Math.random()-0.5)*16,
    y: floorY + Math.random()*6,
    speed: 0.25 + Math.random()*0.35,
    wobble: Math.random()*Math.PI*2,
    scale
  });
}
function updateBubbles(dt, t) {
  for (let i = 0; i < BUBBLE_COUNT; i++) {
    const b = bubbleData[i];
    b.y += b.speed * dt;
    if (b.y > floorY + 7) b.y = floorY + Math.random()*0.5;
    const wob = Math.sin(t*0.8 + b.wobble) * 0.15;
    dummy.position.set(b.x + wob, b.y, b.z + Math.cos(t*0.6+b.wobble)*0.1);
    dummy.scale.setScalar(b.scale);
    dummy.updateMatrix();
    bubbleMesh.setMatrixAt(i, dummy.matrix);
  }
  bubbleMesh.instanceMatrix.needsUpdate = true;
}

// ---------- Pesci ----------
const FISH_COLORS = [0xff8a5b, 0xffd166, 0x4fd6c9, 0xef476f, 0x9b5de5, 0x06d6a0, 0xf4a261];
const fishes = [];

function makeFish(color) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.15, emissive: color, emissiveIntensity: 0.12 });

  const body = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 10), bodyMat);
  body.scale.set(1.3, 0.9, 0.55);
  group.add(body);

  const tail = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.22, 4), bodyMat);
  tail.rotation.z = Math.PI / 2;
  tail.scale.set(1, 1.6, 0.25);
  tail.position.set(-0.24, 0, 0);
  group.add(tail);

  const finTop = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.14, 3), bodyMat);
  finTop.position.set(0.02, 0.13, 0);
  finTop.rotation.z = Math.PI;
  finTop.scale.set(1, 1, 0.2);
  group.add(finTop);

  group.userData.tail = tail;
  return group;
}

function spawnFish(position) {
  const color = FISH_COLORS[Math.floor(Math.random()*FISH_COLORS.length)];
  const fish = makeFish(color);
  const spawnPos = position ? position.clone() : new THREE.Vector3(
    (Math.random()-0.5)*6, floorY + 1 + Math.random()*2.5, (Math.random()-0.5)*6
  );
  fish.position.copy(spawnPos);
  scene.add(fish);
  fishes.push({
    group: fish,
    target: randomSwimTarget(),
    speed: 0.5 + Math.random()*0.5,
    tailPhase: Math.random()*Math.PI*2,
    tailSpeed: 6 + Math.random()*3
  });
}

function randomSwimTarget() {
  const ang = Math.random()*Math.PI*2;
  const rad = Math.random()*7.5;
  return new THREE.Vector3(
    Math.cos(ang)*rad,
    floorY + 0.6 + Math.random()*3,
    Math.sin(ang)*rad
  );
}

for (let i = 0; i < 16; i++) spawnFish();

function updateFish(dt) {
  fishes.forEach(f => {
    const dir = new THREE.Vector3().subVectors(f.target, f.group.position);
    const dist = dir.length();
    if (dist < 0.4) {
      f.target = randomSwimTarget();
    } else {
      dir.normalize();
      f.group.position.addScaledVector(dir, f.speed * dt);
      const targetAngle = Math.atan2(dir.x, dir.z);
      let da = targetAngle - f.group.rotation.y;
      da = Math.atan2(Math.sin(da), Math.cos(da));
      f.group.rotation.y += da * Math.min(1, dt*3);
    }
    f.tailPhase += dt * f.tailSpeed;
    f.group.userData.tail.rotation.y = Math.sin(f.tailPhase) * 0.6;
  });
}

// ---------- Interazione: aggiungi pesce ----------
document.getElementById('btnAddFish').addEventListener('click', () => {
  spawnFish(new THREE.Vector3(camera.position.x, camera.position.y, camera.position.z - 1.2));
});

// Controller VR: grilletto per aggiungere un pesce
renderer.xr.addEventListener('sessionstart', () => {
  document.getElementById('ui').classList.add('hidden');
  const session = renderer.xr.getSession();
  for (const source of session.inputSources) attachControllerEvents();
});
renderer.xr.addEventListener('sessionend', () => {
  document.getElementById('ui').classList.remove('hidden');
});

function attachControllerEvents() {
  for (let i = 0; i < 2; i++) {
    const controller = renderer.xr.getController(i);
    if (controller.userData.bound) continue;
    controller.userData.bound = true;
    controller.addEventListener('selectstart', () => {
      const pos = new THREE.Vector3();
      controller.getWorldPosition(pos);
      spawnFish(pos);
    });
    scene.add(controller);
  }
}
attachControllerEvents();

// ---------- Loop di animazione ----------
const clock = new THREE.Clock();

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  updateFish(dt);
  updateBubbles(dt, t);

  weeds.forEach(w => {
    w.children.forEach((blade, idx) => {
      const wave = Math.sin(t*1.3 + w.userData.phase + idx*0.3) * 0.12;
      let node = blade;
      let depth = 0;
      while (node) {
        node.rotation.z = wave * (1 + depth*0.4);
        node = node.children[0];
        depth++;
      }
    });
  });

  rays.forEach(r => {
    r.rotation.y += dt * r.userData.driftSpeed;
    r.position.y = r.userData.baseY + Math.sin(t*0.3 + r.position.x) * 0.4;
  });

  causticLight.intensity = 0.55 + Math.sin(t*0.7)*0.08;

  if (!renderer.xr.isPresenting) {
    controls.update();
  }

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);
</script>
</body>
</html>
